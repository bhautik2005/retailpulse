data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  ml_output_path: "data/ml_outputs/"

files:
  orders: "olist_orders_dataset.csv"
  order_items: "olist_order_items_dataset.csv"
  products: "olist_products_dataset.csv"
  customers: "olist_customers_dataset.csv"
  payments: "olist_order_payments_dataset.csv"
  reviews: "olist_order_reviews_dataset.csv"
  sellers: "olist_sellers_dataset.csv"
  category: "product_category_name_translation.csv"
  geolocation: "olist_geolocation_dataset.csv"

columns:
  date_columns:
    - order_purchase_timestamp
    - order_approved_at
    - order_delivered_carrier_date
    - order_delivered_customer_date
    - order_estimated_delivery_date
    - shipping_limit_date
    - review_creation_date
    - review_answer_timestamp

cleaning:
  drop_duplicates: true
  remove_negative_price: true
  fill_payment_type: "unknown"

features:
  create_time_features: true
  create_delivery_features: true

merge:
  steps:
    - left: orders
      right: customers
      "on": customer_id
      how: left

    - left: orders
      right: order_items
      "on": order_id
      how: left

    - left: orders
      right: products
      "on": product_id
      how: left

    - left: orders
      right: sellers
      "on": seller_id
      how: left

    - left: orders
      right: payments
      "on": order_id
      how: left

    - left: orders
      right: reviews
      "on": order_id
      how: left

    - left: orders
      right: category
      "on": product_category_name
      how: left

validation:
  required_columns:
    - order_id
    - customer_unique_id
    - price
    - payment_value

  non_null_columns:
    - order_id
    - order_delivered_customer_date

  positive_columns:
    - price
    - payment_value

  range_checks:
    review_score:
      min: 1
      max: 5